<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>InterviewPad | Professional Environment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">
    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold border-r border-slate-700 pr-4">Interview<span class="text-emerald-400">Pad</span></h1>
            <div id="status" class="text-xs uppercase tracking-widest text-slate-400 flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-orange-500" id="status-dot"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <input id="user-email" type="email" placeholder="Enter your email" class="bg-slate-800 text-sm px-3 py-1 rounded border border-slate-700 focus:outline-none focus:border-emerald-500">
            <button id="share-session" class="bg-emerald-600 hover:bg-emerald-500 text-xs px-3 py-1 rounded font-bold transition">Copy Invite Link</button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 grid grid-cols-12 gap-4">
        <!-- Sidebar: Schema -->
        <aside class="col-span-12 lg:col-span-3 space-y-4">
            <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm">
                <h2 class="font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"></path></h2 >
                <div id="schema-details" class="text-xs space-y-2 max-h-[60vh] overflow-y-auto">
                    <!-- Injected by engines.js -->
                </div>
            </div>
        </aside>

        <!-- Editor Area -->
        <section class="col-span-12 lg:col-span-9 flex flex-col gap-4">
            <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
                <div class="flex bg-slate-100 border-b border-slate-200">
                    <button id="tab-python" class="tab-btn active px-6 py-3 text-sm font-semibold border-b-2 border-emerald-600 text-emerald-700 bg-white">Python 3.10</button>
                    <button id="tab-sql" class="tab-btn px-6 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:bg-slate-50">SQL (SQLite)</button>
                </div>

                <div id="python-area" class="tab-content">
                    <textarea id="python-editor"></textarea>
                    <div class="p-4 bg-slate-50 flex justify-between">
                        <button id="run-python" class="bg-slate-900 text-white px-8 py-2 rounded-md font-bold hover:bg-slate-800 disabled:opacity-50">Initialize Python...</button>
                    </div>
                </div>

                <div id="sql-area" class="tab-content hidden">
                    <textarea id="sql-editor"></textarea>
                    <div class="p-4 bg-slate-50 flex justify-between">
                        <button id="run-sql" class="bg-slate-900 text-white px-8 py-2 rounded-md font-bold hover:bg-slate-800">Execute Query</button>
                    </div>
                </div>
            </div>

            <!-- Output Console -->
            <div class="bg-slate-900 rounded-lg shadow-inner p-4 min-h-[200px]">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-mono text-slate-500 uppercase tracking-tighter">Terminal Output</span>
                    <button onclick="document.getElementById('console').textContent = ''" class="text-xs text-slate-500 hover:text-white">Clear</button>
                </div>
                <pre id="console" class="font-mono text-emerald-400 text-sm whitespace-pre-wrap"></pre>
                <div id="sql-table" class="mt-4 overflow-x-auto"></div>
            </div>
        </section>
    </main>

    <!-- External Engines -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    
    <!-- CodeMirror & Yjs Collaboration -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>

    <!-- Modular Application Logic -->
    <script type="module" src="./js/ui.js"></script>
    <script type="module" src="./js/engines.js"></script>
    <script type="module" src="./js/editor.js"></script>
</body>
</html>
